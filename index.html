<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>中文桌宠</title>
  <link id="petThemeStylesheet" rel="stylesheet" href="petThemes/ragdoll-cat.css" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: #2a3340;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    .desktop-pet {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 8px;
      -webkit-app-region: drag;
    }

        #toggleChat,
    #voice,
    #send {
      border: 1px solid rgba(97, 120, 142, 0.18);
      cursor: pointer;
      color: #5c6877;
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(12px);
      transition: transform 0.14s ease, background 0.14s ease, opacity 0.14s ease;
    }

        #voice:hover:not(:disabled),
    #send:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.96);
      transform: translateY(-1px);
    }

    .speech-bubble {
      position: absolute;
      left: 50%;
      bottom: 248px;
      width: fit-content;
      min-width: 92px;
      max-width: min(292px, calc(100% - 42px));
      min-height: 44px;
      max-height: 150px;
      padding: 11px 14px 12px;
      border-radius: 18px 18px 18px 7px;
      color: #344052;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(111, 135, 158, 0.16);
      box-shadow: 0 12px 28px rgba(54, 72, 94, 0.15);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
      opacity: 1;
      overflow-y: auto;
      z-index: 8;
      -webkit-app-region: no-drag;
      user-select: text;
      animation: bubblePop 0.2s ease-out;
    }

    .speech-bubble::before {
      content: "";
      position: absolute;
      left: 42px;
      bottom: -10px;
      width: 18px;
      height: 18px;
      background: inherit;
      border-right: 1px solid rgba(111, 135, 158, 0.12);
      border-bottom: 1px solid rgba(111, 135, 158, 0.12);
      transform: rotate(45deg) skew(10deg, 10deg);
      border-bottom-right-radius: 5px;
    }

    .speech-bubble.user-bubble {
      margin-left: 18px;
      color: #19354d;
      background: rgba(217, 240, 255, 0.92);
      border-radius: 18px 18px 7px 18px;
    }

    .speech-bubble.user-bubble::before {
      left: auto;
      right: 42px;
      transform: rotate(45deg) skew(10deg, 10deg);
    }

    .speech-bubble.thinking-bubble {
      color: #5d6878;
      background: rgba(255, 255, 255, 0.78);
    }

    .speech-bubble.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(8px) scale(0.96);
      pointer-events: none;
    }

    .speaker {
      display: block;
      margin-bottom: 3px;
      color: #738094;
      font-size: 11px;
      font-weight: 700;
    }

    .user-bubble .speaker {
      color: #4d7da2;
    }

    #bubbleText {
      display: block;
      line-height: 1.45;
      font-size: 14px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .status-pill {
      position: absolute;
      left: 50%;
      bottom: 230px;
      transform: translateX(-50%);
      max-width: 220px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #5d6878;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(111, 135, 158, 0.16);
      backdrop-filter: blur(12px);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 5;
    }

    #toggleChat {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 42px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 999px;
      font-size: 17px;
      z-index: 10;
      -webkit-app-region: no-drag;
    }

    #toggleChat:hover {
      background: rgba(255, 255, 255, 0.96);
      transform: translateX(-50%) translateY(-1px);
    }

    .input-dock {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 52px;
      display: grid;
      grid-template-columns: 1fr 40px 40px;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(111, 135, 158, 0.16);
      box-shadow: 0 12px 30px rgba(54, 72, 94, 0.14);
      backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(0.98);
      transition: opacity 0.16s ease, transform 0.16s ease;
      z-index: 9;
      -webkit-app-region: no-drag;
    }

    .input-dock.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    input {
      min-width: 0;
      height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(98, 125, 150, 0.24);
      border-radius: 999px;
      outline: none;
      color: #28313f;
      background: rgba(255, 255, 255, 0.88);
      font-size: 14px;
      user-select: text;
    }

    input:focus {
      border-color: #62aee8;
      box-shadow: 0 0 0 3px rgba(98, 174, 232, 0.18);
    }

    #voice,
    #send {
      width: 40px;
      height: 38px;
      border-radius: 50%;
      font-size: 17px;
    }

    #send:disabled { opacity: 0.55; cursor: default; }

    #voice.listening {
      color: #9a3158;
      background: rgba(255, 213, 229, 0.95);
      box-shadow: 0 0 0 3px rgba(255, 118, 164, 0.18);
    }

  </style>
</head>
<body>
  <main class="desktop-pet">

    <section id="speechBubble" class="speech-bubble">
      <span id="bubbleSpeaker" class="speaker">糖团</span>
      <span id="bubbleText">你好呀，我是糖团，会乖乖在桌面上陪你。</span>
    </section>

    <div id="status" class="status-pill">在线陪伴中</div>

    <section id="petMount" class="pet-wrap"></section>

    <section id="inputDock" class="input-dock">
      <input id="input" placeholder="和我说点什么..." />
      <button id="voice" title="语音输入">🎙</button>
      <button id="send" title="发送">➤</button>
    </section>

    <button id="toggleChat" title="展开/收起输入">💬</button>
  </main>

  <script src="petTheme.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
